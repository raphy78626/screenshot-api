<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot API — Prototype</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; color: #f8fafc }
    .sub { color: #94a3b8; font-size: 0.875rem; margin-bottom: 2rem }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; max-width: 780px; margin: 0 auto }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem }
    input[type=text] { flex: 1; min-width: 260px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 0.6rem 0.9rem; color: #f1f5f9; font-size: 0.95rem; outline: none }
    input[type=text]:focus { border-color: #6366f1 }
    select { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 0.6rem 0.75rem; color: #f1f5f9; font-size: 0.875rem; outline: none }
    label { font-size: 0.8rem; color: #94a3b8; display: flex; align-items: center; gap: 0.4rem }
    button { background: #6366f1; border: none; border-radius: 8px; padding: 0.6rem 1.4rem; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; white-space: nowrap }
    button:hover { background: #4f46e5 }
    button:disabled { background: #334155; cursor: not-allowed }
    .status { font-size: 0.8rem; color: #94a3b8; margin-bottom: 1rem; min-height: 1.2em }
    .status.ok { color: #34d399 }
    .status.err { color: #f87171 }
    .result { display: none; margin-top: 1rem }
    .result img { max-width: 100%; border-radius: 8px; border: 1px solid #334155 }
    .curl-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 0.75rem 1rem; font-family: monospace; font-size: 0.78rem; color: #7dd3fc; margin-top: 1rem; word-break: break-all }
  </style>
</head>
<body>
  <div class="card">
    <h1>Screenshot API</h1>
    <p class="sub">Phase 0 prototype — URL → PNG/JPEG/PDF in one request</p>

    <div class="row">
      <input type="text" id="url" placeholder="https://example.com" value="https://example.com">
      <select id="format">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="pdf">PDF</option>
      </select>
      <select id="width">
        <option value="1280">1280px</option>
        <option value="1920">1920px</option>
        <option value="375">375px (mobile)</option>
        <option value="768">768px (tablet)</option>
      </select>
      <label><input type="checkbox" id="fullpage"> Full page</label>
      <button id="btn" onclick="capture()">Capture</button>
    </div>

    <div class="status" id="status">Ready.</div>
    <div class="result" id="result">
      <img id="img" src="" alt="screenshot">
      <div class="curl-box" id="curl"></div>
    </div>
  </div>

  <script>
    async function capture() {
      const url = document.getElementById('url').value.trim()
      const format = document.getElementById('format').value
      const width = document.getElementById('width').value
      const fullPage = document.getElementById('fullpage').checked
      const btn = document.getElementById('btn')
      const status = document.getElementById('status')
      const result = document.getElementById('result')
      const img = document.getElementById('img')
      const curlEl = document.getElementById('curl')

      if (!url) { status.textContent = 'Enter a URL first.'; status.className = 'status err'; return }

      btn.disabled = true
      status.textContent = 'Capturing…'
      status.className = 'status'
      result.style.display = 'none'

      const params = new URLSearchParams({ url, format, width, full_page: fullPage })
      const endpoint = `/screenshot?${params}`
      const t0 = performance.now()

      try {
        const res = await fetch(endpoint)
        const ms = Math.round(performance.now() - t0)
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }))
          throw new Error(err.error || res.statusText)
        }

        if (format === 'pdf') {
          const blob = await res.blob()
          const objUrl = URL.createObjectURL(blob)
          window.open(objUrl, '_blank')
          status.textContent = `PDF opened in new tab — ${ms}ms`
          status.className = 'status ok'
        } else {
          const blob = await res.blob()
          const objUrl = URL.createObjectURL(blob)
          img.src = objUrl
          result.style.display = 'block'
          status.textContent = `Captured in ${ms}ms (server: ${res.headers.get('x-capture-ms') ?? '?'}ms)`
          status.className = 'status ok'
        }

        curlEl.textContent = `curl "http://localhost:3099${endpoint}" --output shot.${format}`
      } catch (e) {
        status.textContent = `Error: ${e.message}`
        status.className = 'status err'
      } finally {
        btn.disabled = false
      }
    }

    document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') capture() })
  </script>
</body>
</html>
