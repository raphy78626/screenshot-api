<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: Atlassian blue rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="#0052CC"/>

  <!-- Subtle inner gradient overlay -->
  <defs>
    <linearGradient id="bg-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1868DB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#003884" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="doc-shadow" x="-10%" y="-5%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#001D40" flood-opacity="0.35"/>
    </filter>
    <filter id="badge-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#36B37E" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg-shine)"/>

  <!-- Document page -->
  <g filter="url(#doc-shadow)">
    <rect x="148" y="108" width="196" height="252" rx="14" ry="14" fill="#FFFFFF"/>
    <!-- Folded corner -->
    <path d="M296 108 L344 156 L296 156 Z" fill="#DDEEFF"/>
    <path d="M296 108 L344 156 L296 156 Z" fill="#C8DEFF" opacity="0.6"/>
    <!-- Corner fold line -->
    <path d="M296 108 L296 156 L344 156" fill="none" stroke="#B8CFEE" stroke-width="1.5"/>
  </g>

  <!-- Document lines -->
  <rect x="178" y="185" width="112" height="12" rx="6" fill="#0052CC" opacity="0.18"/>
  <rect x="178" y="211" width="136" height="10" rx="5" fill="#0A1929" opacity="0.10"/>
  <rect x="178" y="231" width="124" height="10" rx="5" fill="#0A1929" opacity="0.10"/>
  <rect x="178" y="251" width="130" height="10" rx="5" fill="#0A1929" opacity="0.10"/>
  <rect x="178" y="271" width="100" height="10" rx="5" fill="#0A1929" opacity="0.10"/>
  <rect x="178" y="299" width="88"  height="9"  rx="4.5" fill="#0A1929" opacity="0.07"/>
  <rect x="178" y="316" width="116" height="9"  rx="4.5" fill="#0A1929" opacity="0.07"/>

  <!-- Green verified badge — bottom right of document -->
  <circle cx="336" cy="328" r="52" fill="#1A1A2E" filter="url(#badge-glow)"/>
  <circle cx="336" cy="328" r="52" fill="#36B37E"/>
  <circle cx="336" cy="328" r="44" fill="#2ECC71" opacity="0.25"/>

  <!-- Checkmark -->
  <polyline points="312,328 328,346 362,308" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
