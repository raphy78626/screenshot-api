# Smithery configuration: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties:
      PROXY_SECRET:
        type: string
        description: >
          Shared secret required on X-Proxy-Secret header. Leave empty to
          disable auth (local / dev use). Set this in production to prevent
          callers bypassing billing.
      MAX_CONCURRENCY:
        type: number
        description: Max simultaneous Playwright browser contexts (default 2). Lower on memory-constrained hosts.
      NAV_TIMEOUT_MS:
        type: number
        description: Page navigation timeout in milliseconds (default 20000).
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['tsx', 'src/mcp.ts'],
      env: {
        ...(config.PROXY_SECRET ? { PROXY_SECRET: config.PROXY_SECRET } : {}),
        ...(config.MAX_CONCURRENCY ? { MAX_CONCURRENCY: String(config.MAX_CONCURRENCY) } : {}),
        ...(config.NAV_TIMEOUT_MS ? { NAV_TIMEOUT_MS: String(config.NAV_TIMEOUT_MS) } : {}),
      }
    })
